# =============================================================
#  Veterinary Journal List — 매일 자동 실행 워크플로
#  파일 위치(반드시):  .github/workflows/update_papers.yml
# =============================================================
name: Update Papers Daily

on:
  schedule:
    # 🔧(3) 실행 시각.  아래는 매일 한국시간(KST) 오전 7시 = UTC 22:00 (전날).
    #   바꿀 때:  원하는 한국시각 − 9시간 = UTC 시(hour)
    #   예) KST 06:00 → UTC 21 → "0 21 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:        # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write           # papers.json 커밋 권한

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 내려받기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 논문 수집 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # 요약용 (없으면 요약만 생략)
        run: python fetch_papers.py

      - name: papers.json 자동 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.json
          git diff --staged --quiet || git commit -m "논문 자동 업데이트: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
